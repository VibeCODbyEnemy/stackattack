<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Складской грузчик — ФИЗИЧЕСКОЕ ТОЛКАНИЕ</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📦%3C/text%3E%3C/svg%3E">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.80.1/phaser.min.js"></script>
  <style>
    * { user-select: none; touch-action: manipulation; }
    body { margin: 0; overflow: hidden; background: #1a2a32; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .top-panel { position: fixed; top: 12px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 2000; pointer-events: none; }
    .top-buttons { display: flex; justify-content: center; gap: 12px; pointer-events: auto; flex-wrap: wrap; }
    .top-buttons button { background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.4); border-radius: 40px; color: white; font-size: 16px; font-weight: bold; padding: 6px 12px; min-width: 70px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); transition: 0.07s linear; touch-action: manipulation; cursor: pointer; font-family: monospace; }
    .top-buttons button:active { transform: scale(0.95); background: rgba(100, 150, 220, 0.9); }
    .score-board { background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); border-radius: 40px; padding: 6px 20px; color: white; font-size: 20px; font-weight: bold; font-family: monospace; pointer-events: auto; border: 1px solid rgba(255,215,0,0.6); }
    .speed-buttons { display: flex; gap: 8px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); border-radius: 40px; padding: 4px 12px; pointer-events: auto; }
    .speed-buttons button { background: #ff8800; border: none; border-radius: 30px; color: white; font-weight: bold; padding: 4px 12px; font-size: 14px; cursor: pointer; transition: 0.07s linear; }
    .speed-buttons button:active { transform: scale(0.95); background: #ffaa44; }
    .speed-buttons .active { background: #00aa44; box-shadow: 0 0 8px #00ff00; }
    .godmode-btn { background: #aa44ff !important; border-color: #ff88ff !important; }
    .godmode-btn.active { background: #ff44aa !important; box-shadow: 0 0 12px #ff88ff; }
    .touch-panel { position: fixed; bottom: 25px; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1800; pointer-events: none; }
    .move-group { display: flex; gap: 40px; background: rgba(0,0,0,0.3); padding: 12px 25px; border-radius: 100px; backdrop-filter: blur(4px); pointer-events: auto; }
    .action-group { display: flex; gap: 40px; background: rgba(0,0,0,0.3); padding: 12px 25px; border-radius: 100px; backdrop-filter: blur(4px); pointer-events: auto; margin-left: 80px; }
    .touch-panel button { background: rgba(20,25,45,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); border-radius: 60px; color: white; font-size: 32px; font-weight: bold; text-shadow: 0 2px 3px black; width: 75px; height: 75px; box-shadow: 0 6px 12px rgba(0,0,0,0.4); transition: 0.05s linear; touch-action: manipulation; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: monospace; }
    .touch-panel button:active { transform: scale(0.92); background: rgba(100,150,220,0.9); border-color: #ffcc88; }
    @media (max-width:700px){ .touch-panel button{ width:65px; height:65px; font-size:28px; } }
    @media (max-width:550px){ .touch-panel button{ width:55px; height:55px; font-size:24px; } }
    .debug-btn { background: rgba(0,0,0,0.75) !important; border-color: #00ff00 !important; color: #00ff00 !important; }
    .debug-btn.active { background: #00aa44 !important; color: white !important; border-color: #ffffff !important; }
    .marker-panel { position: fixed; top: 80px; right: 10px; background: rgba(0,0,0,0.85); padding: 8px; border-radius: 8px; z-index: 2100; pointer-events: auto; display: flex; flex-direction: column; gap: 5px; font-size: 11px; color: white; min-width: 180px; backdrop-filter: blur(4px); max-height: 350px; overflow-y: auto; }
    .marker-panel button { background: #ff4444; border: none; color: white; padding: 4px 8px; margin: 2px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .info-panel { position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 8px; color: #0f0; font-size: 10px; font-family: monospace; z-index: 2100; pointer-events: none; }
  </style>
</head>
<body>
<div class="top-panel" id="topPanel" style="display: none;">
  <div class="top-buttons">
    <button id="btnPause">⏸️ ПАУЗА</button>
    <button id="btnMenu">📜 МЕНЮ</button>
    <button id="btnDebug" class="debug-btn">🔍 ОТЛАДКА</button>
    <button id="btnToggleMarkers" style="background:#ff4444;">🔴 ЗОНЫ</button>
    <button id="btnGodMode" class="godmode-btn">🛡️ БЕССМЕРТИЕ</button>
    <div class="speed-buttons">
      <button id="btnSpeed1" class="active">x1</button>
      <button id="btnSpeed2">x2</button>
      <button id="btnSpeed4">x4</button>
      <button id="btnSpeed8">x8</button>
    </div>
  </div>
  <div class="score-board" id="scoreBoard">ОЧКИ: 0</div>
</div>
<div class="touch-panel" id="touchPanel" style="display: none;">
  <div class="move-group"><button id="btnLeft">◀</button><button id="btnRight">▶</button></div>
  <div class="action-group"><button id="btnJump">▲</button></div>
</div>
<div class="marker-panel" id="markerPanel" style="display: none;">
  <div style="font-weight:bold; text-align:center; margin-bottom:5px;">🔴 ЗОНЫ ДЛЯ ЯЩИКОВ</div>
  <div id="markerList"></div>
  <div style="font-size:10px; margin-top:5px; color:#ffaa00; text-align:center;">🎯 16+ ЯЩИКОВ В РЯДУ = ВЗРЫВ! | 📊 МАКС. ВЫСОТА: 8</div>
</div>
<div class="info-panel" id="infoPanel">📦 ФИЗИЧЕСКОЕ ТОЛКАНИЕ: иди в ящик - он двигается! Ящики не проваливаются.</div>

<script>
// ========== РАЗМЕРЫ ==========
const PLAYER_SPRITE_WIDTH = 242;
const PLAYER_SPRITE_HEIGHT = 358;
const PLAYER_SCALE_FACTOR = 0.24;
const PLAYER_WIDTH = Math.floor(PLAYER_SPRITE_WIDTH * PLAYER_SCALE_FACTOR);
const PLAYER_HEIGHT = Math.floor(PLAYER_SPRITE_HEIGHT * PLAYER_SCALE_FACTOR);

const COLLIDER_WIDTH = PLAYER_WIDTH - 8;
const COLLIDER_HEIGHT = PLAYER_HEIGHT - 10;
const COLLIDER_OFFSET_X = (PLAYER_WIDTH - COLLIDER_WIDTH) / 2;
const COLLIDER_OFFSET_Y = 5;

const PLAYER_GROUND_Y = 340;
const BOX_GROUND_Y = 370;
const MAX_STACK_HEIGHT = 8;
const WIN_LINE_LENGTH = 16;

// РАЗМЕРЫ ЯЩИКА (должны быть объявлены до использования)
const BOX_VISUAL_SCALE = 0.45;
const BOX_VISUAL_SIZE = 38;
const BOX_CORRECT_Y = BOX_GROUND_Y - BOX_VISUAL_SIZE / 2;

// ========== ГЛОБАЛЬНЫЕ ==========
let player, boxes, scoreText, menuText, titleScreen, clickArea;
let score = 0, isGameOver = false, gameStarted = false, isPaused = false, showMenu = false;
let touchLeft = false, touchRight = false, jumpCooldown = false;
let lastDirection = 'right';
let craneSpawnTimer, standingOnBox = false;
let markers = [], markersEnabled = true, playerDebugRect = null;
let debugEnabled = false, currentScene = null, leftBound = 0, rightBound = 800;
let currentSpeed = 1;
let godMode = false;
let isExploding = false;

let boxDebugRects = new Map();
let pushedBoxes = new Set();

const baseSpawnDelay = 2200;
const basePlayerSpeed = 180;
const baseGravity = 800;
const baseJumpPower = -340;
const baseFallSpeed = 120;

const STORAGE_KEY = 'warehouse_markers_simple';
const DEFAULT_MARKERS_X = [97, 135, 173, 211, 249, 287, 325, 363, 401, 439, 477, 515, 553, 591, 629, 667];

const PLAYER_SPRITE_Y = PLAYER_GROUND_Y - PLAYER_HEIGHT + COLLIDER_OFFSET_Y;

const config = {
  type: Phaser.AUTO,
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 800, height: 400 },
  physics: { default: 'arcade', arcade: { gravity: { y: baseGravity }, debug: false } },
  scene: { preload, create, update }
};
const game = new Phaser.Game(config);

// ========== ОТЛАДКА ==========
function updateBoxDebugRects() {
  if (!currentScene || !boxes) return;
  for (let [box, rect] of boxDebugRects.entries()) {
    if (rect && rect.destroy) rect.destroy();
  }
  boxDebugRects.clear();
  if (!debugEnabled) return;
  const activeBoxes = boxes.getChildren().filter(b => b && b.active);
  for (let box of activeBoxes) {
    const rect = currentScene.add.rectangle(box.x, box.y, BOX_VISUAL_SIZE, BOX_VISUAL_SIZE, 0xff0000, 0);
    rect.setStrokeStyle(2, 0xff0000, 0.8);
    rect.setDepth(2000);
    boxDebugRects.set(box, rect);
  }
}

function syncBoxDebugRects() {
  if (!debugEnabled) return;
  for (let [box, rect] of boxDebugRects.entries()) {
    if (box && box.active && rect && rect.active) {
      rect.setPosition(box.x, box.y);
    } else if (rect && rect.destroy) {
      rect.destroy();
      boxDebugRects.delete(box);
    }
  }
}

function toggleDebug() {
  debugEnabled = !debugEnabled;
  const btn = document.getElementById('btnDebug');
  if (debugEnabled) {
    btn.classList.add('active');
    updateBoxDebugRects();
    if (playerDebugRect) playerDebugRect.setVisible(true);
  } else {
    btn.classList.remove('active');
    for (let [box, rect] of boxDebugRects.entries()) {
      if (rect && rect.destroy) rect.destroy();
    }
    boxDebugRects.clear();
    if (playerDebugRect) playerDebugRect.setVisible(false);
  }
}

function setSpeed(multiplier) {
  currentSpeed = multiplier;
  if (!currentScene) return;
  currentScene.physics.world.gravity.y = baseGravity * multiplier;
  if (player) player.body.setMaxVelocity(300 * multiplier, 550);
  if (craneSpawnTimer) {
    craneSpawnTimer.remove();
    const newDelay = Math.max(500, baseSpawnDelay / multiplier);
    craneSpawnTimer = currentScene.time.addEvent({ delay: newDelay, callback: () => spawnCrane.call(currentScene), callbackScope: currentScene, loop: true });
  }
  document.getElementById('btnSpeed1').classList.remove('active');
  document.getElementById('btnSpeed2').classList.remove('active');
  document.getElementById('btnSpeed4').classList.remove('active');
  document.getElementById('btnSpeed8').classList.remove('active');
  if (multiplier === 1) document.getElementById('btnSpeed1').classList.add('active');
  if (multiplier === 2) document.getElementById('btnSpeed2').classList.add('active');
  if (multiplier === 4) document.getElementById('btnSpeed4').classList.add('active');
  if (multiplier === 8) document.getElementById('btnSpeed8').classList.add('active');
}

function resetMovementFlags() { touchLeft = false; touchRight = false; }
function getPlayerSpeed() { return basePlayerSpeed * currentSpeed; }
function getJumpPower() { return baseJumpPower * Math.sqrt(currentSpeed); }
function getBoxFallSpeed() { return baseFallSpeed * currentSpeed; }

function toggleGodMode() {
  godMode = !godMode;
  const btn = document.getElementById('btnGodMode');
  if (godMode) {
    btn.classList.add('active');
    if (currentScene) {
      const msg = currentScene.add.text(400, 60, '🛡️ БЕССМЕРТИЕ ВКЛЮЧЕНО 🛡️', 
        { fontSize: '18px', fill: '#ff88ff', fontWeight: 'bold', backgroundColor: '#000000aa', padding: { x: 10, y: 5 } });
      msg.setOrigin(0.5); msg.setDepth(2000);
      currentScene.time.delayedCall(2000, () => msg.destroy());
    }
  } else {
    btn.classList.remove('active');
    if (currentScene) {
      const msg = currentScene.add.text(400, 60, 'БЕССМЕРТИЕ ВЫКЛЮЧЕНО', 
        { fontSize: '18px', fill: '#ffaa44', fontWeight: 'bold', backgroundColor: '#000000aa', padding: { x: 10, y: 5 } });
      msg.setOrigin(0.5); msg.setDepth(2000);
      currentScene.time.delayedCall(2000, () => msg.destroy());
    }
  }
}

// ========== МАРКЕРЫ ==========
function saveMarkers() { localStorage.setItem(STORAGE_KEY, JSON.stringify(markers.map(m => m.x))); updateMarkerUI(); }
function loadMarkers() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) { try { const savedX = JSON.parse(saved); if (savedX && savedX.length) { markers = savedX.map((x, idx) => ({ id: idx + 1, x: x })); updateBounds(); return; } } catch(e) { } }
  markers = DEFAULT_MARKERS_X.map((x, idx) => ({ id: idx + 1, x: x }));
  updateBounds(); saveMarkers();
}
function updateBounds() {
  if (!markers.length) { leftBound = 0; rightBound = 800; return; }
  const sorted = [...markers].sort((a,b) => a.x - b.x);
  leftBound = sorted[0].x;
  rightBound = sorted[sorted.length-1].x + BOX_VISUAL_SIZE;
}
function getRandomMarkerX() { return markers.length ? markers[Math.floor(Math.random() * markers.length)].x + BOX_VISUAL_SIZE/2 : 400; }
function updateMarkerUI() {
  const container = document.getElementById('markerList');
  if (!container) return;
  container.innerHTML = '';
  markers.sort((a,b) => a.x - b.x).forEach(m => { const div = document.createElement('div'); div.className = 'marker-item'; div.innerHTML = `<span>#${m.id}</span><span class="x-val">${Math.round(m.x)}-${Math.round(m.x+BOX_VISUAL_SIZE)}px</span>`; container.appendChild(div); });
}
function rebuildMarkers() {
  if (!currentScene) return;
  markers.forEach(m => { if (m.rect) m.rect.destroy(); if (m.text) m.text.destroy(); });
  markers.forEach(m => {
    const rect = currentScene.add.rectangle(m.x + BOX_VISUAL_SIZE/2, 200, BOX_VISUAL_SIZE, 400, 0xff0000, 0.4);
    rect.setStrokeStyle(2, 0xff0000, 1); rect.setDepth(500); rect.setVisible(markersEnabled); m.rect = rect;
    const text = currentScene.add.text(m.x + BOX_VISUAL_SIZE/2 - 18, 20, `#${m.id}`, { fontSize: '12px', fill: '#ff0000', fontWeight: 'bold', backgroundColor: '#000000aa', padding: { x: 3, y: 2 } });
    text.setDepth(501); text.setVisible(markersEnabled); m.text = text;
  });
}
function enforceBoundary() {
  if (!player) return;
  const minX = leftBound + PLAYER_WIDTH/2, maxX = rightBound - PLAYER_WIDTH/2;
  if (player.x < minX) { player.x = minX; player.body.reset(player.x, player.y); player.body.setVelocityX(0); }
  if (player.x > maxX) { player.x = maxX; player.body.reset(player.x, player.y); player.body.setVelocityX(0); }
  boxes.getChildren().forEach(box => {
    if (!box.active) return;
    const minBoxX = leftBound + BOX_VISUAL_SIZE/2, maxBoxX = rightBound - BOX_VISUAL_SIZE/2;
    if (box.x < minBoxX) { box.x = minBoxX; box.body.reset(box.x, box.y); box.body.setVelocityX(0); }
    if (box.x > maxBoxX) { box.x = maxBoxX; box.body.reset(box.x, box.y); box.body.setVelocityX(0); }
  });
}
function fixBoxYPosition(box) {
  if (!box || !box.active) return;
  if (Math.abs(box.y - BOX_CORRECT_Y) > 2) {
    box.y = BOX_CORRECT_Y;
    if (box.body) box.body.reset(box.x, box.y);
  }
}

// ========== ВЫСОТА ==========
function checkStackHeight() {
  if (!boxes) return false;
  const boxList = boxes.getChildren().filter(b => b.active);
  const columns = new Map();
  for (let box of boxList) {
    const xKey = Math.round(box.x / 10) * 10;
    if (!columns.has(xKey)) columns.set(xKey, []);
    columns.get(xKey).push(box);
  }
  for (let [x, column] of columns.entries()) {
    const uniqueY = new Set();
    for (let box of column) uniqueY.add(Math.round(box.y / BOX_VISUAL_SIZE));
    if (uniqueY.size > MAX_STACK_HEIGHT) {
      gameOverWithReason(`ПРЕВЫШЕНА МАКСИМАЛЬНАЯ ВЫСОТА!\nНельзя ставить больше ${MAX_STACK_HEIGHT} ящиков в стопку.`);
      return true;
    }
  }
  return false;
}
function wouldExceedHeight(box, targetX) {
  if (!boxes) return false;
  const boxList = boxes.getChildren().filter(b => b.active && b !== box);
  const sameColumn = boxList.filter(b => Math.abs(b.x - targetX) < BOX_VISUAL_SIZE/2);
  const uniqueYLevels = new Set();
  for (let b of sameColumn) uniqueYLevels.add(Math.round(b.y / BOX_VISUAL_SIZE));
  return (uniqueYLevels.size + 1) > MAX_STACK_HEIGHT;
}

// ========== ГРУППЫ ДЛЯ ВЕРТИКАЛЬНОЙ СТАБИЛИЗАЦИИ ==========
let boxGroupMap = new Map();
function getGroup(box) {
  if (!boxGroupMap.has(box)) boxGroupMap.set(box, new Set([box]));
  return boxGroupMap.get(box);
}
function mergeGroups(boxA, boxB) {
  const groupA = getGroup(boxA), groupB = getGroup(boxB);
  if (groupA === groupB) return groupA;
  if (groupB.size > groupA.size) { for (let b of groupA) { groupB.add(b); boxGroupMap.set(b, groupB); } return groupB; }
  else { for (let b of groupB) { groupA.add(b); boxGroupMap.set(b, groupA); } return groupA; }
}
function stabilizeGroup(group) {
  if (!group || group.size === 0) return;
  const boxesArr = Array.from(group).filter(b => b && b.active);
  if (boxesArr.length === 0) return;
  for (let box of boxesArr) fixBoxYPosition(box);
  const byX = new Map();
  for (let box of boxesArr) {
    const xKey = Math.round(box.x / 5) * 5;
    if (!byX.has(xKey)) byX.set(xKey, []);
    byX.get(xKey).push(box);
  }
  for (let [x, column] of byX.entries()) {
    column.sort((a,b) => a.y - b.y);
    for (let i = 0; i < column.length; i++) {
      const targetY = BOX_GROUND_Y - BOX_VISUAL_SIZE/2 - (i * BOX_VISUAL_SIZE);
      column[i].y = targetY;
      if (column[i].body) {
        column[i].body.reset(column[i].x, column[i].y);
        column[i].body.setAllowGravity(false);
        column[i].body.setVelocityY(0);
        column[i].body.setImmovable(true);
      }
    }
  }
  const byY = new Map();
  for (let box of boxesArr) {
    const yKey = Math.round(box.y / 5) * 5;
    if (!byY.has(yKey)) byY.set(yKey, []);
    byY.get(yKey).push(box);
  }
  for (let [y, row] of byY.entries()) {
    row.sort((a,b) => a.x - b.x);
    for (let i = 0; i < row.length; i++) {
      if (i > 0 && row[i] && row[i-1]) {
        row[i].x = row[i-1].x + BOX_VISUAL_SIZE;
      }
      if (row[i].body) row[i].body.reset(row[i].x, row[i].y);
    }
  }
}
function handleBoxCollision(boxA, boxB) {
  if (!boxA.active || !boxB.active) return;
  mergeGroups(boxA, boxB);
  currentScene.time.delayedCall(50, () => {
    if (boxA.active && boxB.active) {
      stabilizeGroup(getGroup(boxA));
      checkHorizontalLines();
    }
  });
}

// ========== ТОЛКАНИЕ ЯЩИКОВ ==========
function onPlayerPushBox(playerObj, box) {
  if (isGameOver || isPaused || showMenu || isExploding) return;
  if (!box.active) return;
  
  const leftPressed = (currentScene.cursors && currentScene.cursors.left.isDown) || touchLeft;
  const rightPressed = (currentScene.cursors && currentScene.cursors.right.isDown) || touchRight;
  
  let pushDirection = 0;
  if (leftPressed) pushDirection = -1;
  else if (rightPressed) pushDirection = 1;
  else return;
  
  const boxIsToRight = (box.x > playerObj.x);
  if ((pushDirection === 1 && !boxIsToRight) || (pushDirection === -1 && boxIsToRight)) return;
  
  pushedBoxes.add(box);
  const playerSpeed = Math.abs(playerObj.body.velocity.x);
  const pushStrength = Math.min(400, playerSpeed * 1.2 + 80);
  box.body.setVelocityX(pushDirection * pushStrength);
  box.body.setAllowGravity(true);
  box.body.setImmovable(false);
  fixBoxYPosition(box);
  box.setTint(0xaaffcc);
  currentScene.time.delayedCall(200, () => {
    if (box.active) {
      box.clearTint();
      fixBoxYPosition(box);
      stabilizeGroup(getGroup(box));
      pushedBoxes.delete(box);
    }
  });
}

// ========== ОПУСКАНИЕ СТЕНЫ И ВЗРЫВ ==========
function lowerAllBoxesAboveY(thresholdY) {
  const allBoxes = boxes.getChildren().filter(b => b.active);
  const toLower = allBoxes.filter(b => b.y < thresholdY);
  for (let box of toLower) {
    box.y += BOX_VISUAL_SIZE;
    if (box.body) {
      box.body.reset(box.x, box.y);
      box.body.setVelocityY(0);
      box.body.setAllowGravity(false);
    }
  }
  for (let box of toLower) {
    if (box.active && boxGroupMap.has(box)) {
      const group = boxGroupMap.get(box);
      if (group && group.size) stabilizeGroup(group);
    }
  }
}

function explodeRowAndLower(rowY, boxesInRow) {
  if (isExploding) return;
  isExploding = true;
  const toDestroy = boxesInRow.filter(b => b && b.active);
  for (let box of toDestroy) {
    if (!box || !box.active) continue;
    for (let i=0;i<20;i++) {
      let angle = Math.random() * Math.PI * 2, speed = 70 + Math.random() * 150;
      let vx = Math.cos(angle) * speed, vy = Math.sin(angle) * speed - 70;
      let part = currentScene.add.rectangle(box.x+(Math.random()-0.5)*30, box.y+(Math.random()-0.5)*30, 5,5, 0xff6600,0.9);
      currentScene.tweens.add({ targets: part, x: part.x+vx*0.2, y: part.y+vy*0.2, alpha:0, scale:0, duration:450, onComplete:()=>{ if(part) part.destroy(); } });
    }
  }
  for (let box of toDestroy) {
    if (box.active) {
      if (box.body) box.body.setEnable(false);
      if (boxGroupMap.has(box)) boxGroupMap.delete(box);
      if (boxDebugRects.has(box)) { boxDebugRects.get(box).destroy(); boxDebugRects.delete(box); }
      box.destroy();
    }
  }
  const addScore = toDestroy.length * 50;
  score += addScore;
  if (scoreText) scoreText.setText(score);
  document.getElementById('scoreBoard').innerHTML = `ОЧКИ: ${score}`;
  if (toDestroy.length > 0) lowerAllBoxesAboveY(rowY);
  if (currentScene) currentScene.cameras.main.shake(100, 0.01);
  const msg = currentScene.add.text(400, 150, `🔥 ВЗРЫВ РЯДА! +${addScore}\nСТЕНА ОПУСТИЛАСЬ!`, 
    { fontSize: '18px', fill: '#ffaa00', fontWeight: 'bold', backgroundColor: '#000000aa', padding: { x: 10, y: 5 } });
  msg.setOrigin(0.5); msg.setDepth(2000);
  currentScene.time.delayedCall(1500, () => msg.destroy());
  currentScene.time.delayedCall(80, () => {
    rebuildAllGroups();
    isExploding = false;
    currentScene.time.delayedCall(200, () => checkHorizontalLines(), [], currentScene);
  }, [], currentScene);
}

function rebuildAllGroups() {
  const allBoxes = boxes.getChildren().filter(b => b.active);
  boxGroupMap.clear();
  for (let box of allBoxes) {
    boxGroupMap.set(box, new Set([box]));
    if (box.body) { box.body.setAllowGravity(false); box.body.setImmovable(true); }
    fixBoxYPosition(box);
  }
  for (let i = 0; i < allBoxes.length; i++) {
    for (let j = i+1; j < allBoxes.length; j++) {
      const a = allBoxes[i], b = allBoxes[j];
      const dx = Math.abs(a.x - b.x), dy = Math.abs(a.y - b.y);
      if (dx < BOX_VISUAL_SIZE - 2 && dy < BOX_VISUAL_SIZE - 2) {
        const groupA = boxGroupMap.get(a), groupB = boxGroupMap.get(b);
        if (groupA !== groupB) {
          for (let b2 of groupB) { groupA.add(b2); boxGroupMap.set(b2, groupA); }
        }
      }
    }
  }
  const processed = new Set();
  for (let box of allBoxes) {
    const grp = boxGroupMap.get(box);
    if (!processed.has(grp)) { processed.add(grp); stabilizeGroup(grp); }
  }
}

function checkHorizontalLines() {
  if (isExploding) return false;
  const allBoxes = boxes.getChildren().filter(b => b.active);
  if (allBoxes.length < WIN_LINE_LENGTH) return false;
  const rowsByY = new Map();
  const toleranceY = 8;
  for (let box of allBoxes) {
    let found = false;
    for (let [yKey, list] of rowsByY.entries()) {
      if (Math.abs(box.y - yKey) <= toleranceY) { list.push(box); found = true; break; }
    }
    if (!found) rowsByY.set(box.y, [box]);
  }
  const rowsToExplode = [];
  for (let [y, rowBoxes] of rowsByY.entries()) {
    if (rowBoxes.length >= WIN_LINE_LENGTH) {
      rowBoxes.sort((a,b)=>a.x-b.x);
      let chain = [rowBoxes[0]];
      for (let i=1;i<rowBoxes.length;i++) {
        if (rowBoxes[i].x - rowBoxes[i-1].x <= BOX_VISUAL_SIZE+3) chain.push(rowBoxes[i]);
        else { if (chain.length >= WIN_LINE_LENGTH) rowsToExplode.push({y, boxes:[...chain]}); chain=[rowBoxes[i]]; }
      }
      if (chain.length >= WIN_LINE_LENGTH) rowsToExplode.push({y, boxes:[...chain]});
    }
  }
  if (rowsToExplode.length===0) return false;
  for (let row of rowsToExplode) for (let box of row.boxes) if(box.active) box.setTint(0xffaa44);
  currentScene.time.delayedCall(50, () => { for (let row of rowsToExplode) explodeRowAndLower(row.y, row.boxes); });
  return true;
}

function gameOverWithReason(reason) {
  if (isGameOver) return;
  isGameOver = true;
  if (craneSpawnTimer) craneSpawnTimer.remove();
  if (currentScene) currentScene.physics.world.pause();
  resetMovementFlags();
  menuText.setVisible(true);
  menuText.setText(`💀 ИГРА ОКОНЧЕНА 💀\n${reason}\nОчки: ${score}\nНажмите МЕНЮ → Начать заново`);
  showMenu = true;
}
function gameOver() { if (!godMode) gameOverWithReason("Ящик упал на голову!"); else { currentScene.add.text(400,80,'🛡️ БЕССМЕРТИЕ СПАСЛО!',{fontSize:'20px',fill:'#ff88ff',backgroundColor:'#000000aa'}).setOrigin(0.5).setDepth(2000); } }

// ========== ФАЗЕР ==========
function preload() {
  this.load.image('bg', 'bg.png');
  this.load.image('run1', 'run1.png');
  this.load.image('run2', 'run2.png');
  this.load.image('run3', 'run3.png');
  this.load.image('run4', 'run4.png');
  this.load.image('title', 'title.png');
  this.load.image('box', 'box.png');
}

function create() {
  currentScene = this; loadMarkers();
  titleScreen = this.add.image(400,200,'title'); titleScreen.setDisplaySize(800,400).setDepth(3000);
  clickArea = this.add.rectangle(400,350,300,60,0x000000,0).setInteractive({useHandCursor:true}).setDepth(3001);
  this.tweens.add({ targets: clickArea, scale:{from:1,to:1.02}, duration:800, yoyo:true, repeat:-1 });
  const startGameFunc = () => { if(!gameStarted){ gameStarted=true; titleScreen.destroy(); clickArea.destroy(); document.getElementById('topPanel').style.display='flex'; document.getElementById('touchPanel').style.display='flex'; document.getElementById('markerPanel').style.display='flex'; resetMovementFlags(); initGameScene.call(this); } };
  clickArea.on('pointerdown', startGameFunc); this.input.on('pointerdown', (p)=>{ if(!gameStarted) startGameFunc(); });
  setupUIButtons.call(this); setupTouchControls();
}

function initGameScene() {
  isGameOver=false; isPaused=false; showMenu=false; isExploding=false; score=0; boxGroupMap.clear(); pushedBoxes.clear();
  if(scoreText) scoreText.setText('0'); document.getElementById('scoreBoard').innerHTML='ОЧКИ: 0'; setSpeed(1);
  this.bg = this.add.image(400,200,'bg'); this.bg.displayWidth=800; this.bg.displayHeight=400;
  this.playerGround = this.physics.add.staticGroup(); this.playerGround.create(400,PLAYER_GROUND_Y+8,800,20).setDisplaySize(800,20).refreshBody().visible=false;
  this.boxGround = this.physics.add.staticGroup(); this.boxGround.create(400,BOX_GROUND_Y+8,800,24).setDisplaySize(800,24).refreshBody().visible=false;
  
  boxes = this.physics.add.group({
    collideWorldBounds: false,
    bounceX: 0.1,
    bounceY: 0,
    dragX: 0.96,
    gravityY: baseGravity * currentSpeed
  });
  
  const startX = markers.length>0? markers[0].x+BOX_VISUAL_SIZE/2 : 200;
  
  player = this.physics.add.sprite(startX, PLAYER_SPRITE_Y, 'run1');
  player.setScale(PLAYER_SCALE_FACTOR);
  player.setCollideWorldBounds(false);
  player.body.setSize(COLLIDER_WIDTH, COLLIDER_HEIGHT, COLLIDER_OFFSET_X, COLLIDER_OFFSET_Y);
  player.body.setMaxVelocity(300 * currentSpeed, 550);
  player.body.setDragX(0.96);
  
  playerDebugRect = this.add.rectangle(player.x + COLLIDER_OFFSET_X, player.y + COLLIDER_OFFSET_Y, COLLIDER_WIDTH, COLLIDER_HEIGHT, 0x00ff00, 0.3);
  playerDebugRect.setStrokeStyle(2, 0x00ff00, 1);
  playerDebugRect.setDepth(999);
  playerDebugRect.setVisible(debugEnabled);
  
  this.physics.add.collider(player, this.playerGround);
  this.physics.add.collider(boxes, this.boxGround);
  this.physics.add.collider(boxes, boxes, handleBoxCollision);
  this.physics.add.collider(player, boxes, onPlayerPushBox, null, this);
  
  this.physics.add.collider(player, boxes, (p,box)=>{ 
    const pBottom = p.y + COLLIDER_OFFSET_Y + COLLIDER_HEIGHT; 
    const bTop = box.y - BOX_VISUAL_SIZE/2; 
    if(pBottom >= bTop - 5 && pBottom <= bTop + 12 && p.body.velocity.y >= 0){ 
      p.y = bTop - COLLIDER_HEIGHT - COLLIDER_OFFSET_Y; 
      p.body.setVelocityY(0); 
      standingOnBox = true; 
    } 
  });
  
  rebuildMarkers();
  this.anims.create({ key:'run', frames:[{key:'run1'},{key:'run2'},{key:'run3'},{key:'run4'}], frameRate:12, repeat:-1 });
  scoreText = this.add.text(680,18,'0',{fontSize:'26px',fill:'#ffdd88',fontFamily:'monospace'}); scoreText.setDepth(1000);
  menuText = this.add.text(400,200,'',{fontSize:'18px',fill:'#fff',backgroundColor:'#000',padding:{x:20,y:20}}).setOrigin(0.5).setDepth(2000).setVisible(false);
  this.cursors = this.input.keyboard.createCursorKeys();
  craneSpawnTimer = this.time.addEvent({ delay: baseSpawnDelay, callback:()=>spawnCrane.call(this), callbackScope:this, loop:true });
  updateBoxDebugRects();
}

function spawnCrane() {
  if(isGameOver||isPaused||showMenu||!gameStarted||isExploding) return;
  if(!markers.length) return;
  const targetX = getRandomMarkerX();
  if(wouldExceedHeight(null,targetX)){ gameOverWithReason(`НЕЛЬЗЯ СТАВИТЬ ${MAX_STACK_HEIGHT+1}-Й ЯЩИК!`); return; }
  const crane = this.add.graphics(); crane.lineStyle(4,0x888888); crane.moveTo(targetX,0); crane.lineTo(targetX,35); crane.fillStyle(0x666666); crane.fillCircle(targetX,35,8); crane.setDepth(900);
  this.time.delayedCall(700,()=>{
    crane.destroy(); if(isGameOver||isPaused||showMenu||isExploding) return;
    if(wouldExceedHeight(null,targetX)){ gameOverWithReason(`НЕЛЬЗЯ СТАВИТЬ ${MAX_STACK_HEIGHT+1}-Й ЯЩИК!`); return; }
    const box = boxes.create(targetX,20,'box');
    box.setScale(BOX_VISUAL_SCALE);
    box.body.setSize(BOX_VISUAL_SIZE, BOX_VISUAL_SIZE, 0, 0);
    box.setVelocityY(getBoxFallSpeed());
    box.setTint(0xccaa66);
    box.body.setDragX(0.96);
    box.body.setAllowGravity(true);
    box.body.setImmovable(false);
    box.body.setBounce(0.1);
    boxGroupMap.set(box,new Set([box]));
    if(debugEnabled) updateBoxDebugRects();
    this.time.delayedCall(400,()=>{ if(box.active){ fixBoxYPosition(box); stabilizeGroup(getGroup(box)); checkStackHeight(); checkHorizontalLines(); if(debugEnabled) updateBoxDebugRects(); } });
    let deathCheck=false;
    const check=()=>{ if(!deathCheck && box.active && player.active && !godMode){ 
      const pt = player.y + COLLIDER_OFFSET_Y; 
      const bb = box.y + BOX_VISUAL_SIZE/2; 
      if(box.body.velocity.y > 60 && bb > pt - 5 && Math.abs(box.x - player.x) < COLLIDER_WIDTH/2 + BOX_VISUAL_SIZE/2 - 5){ 
        deathCheck=true; gameOver(); 
      } 
    } };
    this.time.delayedCall(150,check); this.time.delayedCall(350,check);
  },[],this);
}

function setupUIButtons() {
  document.getElementById('btnPause').onclick = ()=>{ if(!isGameOver && !showMenu && gameStarted){ isPaused=!isPaused; if(isPaused){ this.physics.world.pause(); resetMovementFlags(); } else this.physics.world.resume(); } };
  document.getElementById('btnMenu').onclick = ()=>{ if(isGameOver) this.scene.restart(); else { showMenu=!showMenu; if(showMenu){ this.physics.world.pause(); resetMovementFlags(); menuText.setVisible(true); menuText.setText('📦 СКЛАДСКОЙ ГРУЗЧИК\n✅ ИСПРАВЛЕНО: ящики не проваливаются\n🔥 16+ ящиков в ряду = ВЗРЫВ!\n🛡️ БЕССМЕРТИЕ\n⚡ УСКОРЕНИЕ'); } else { menuText.setVisible(false); if(!isPaused && !isGameOver) this.physics.world.resume(); } } };
  document.getElementById('btnDebug').onclick = ()=>toggleDebug();
  document.getElementById('btnToggleMarkers').onclick = ()=>{ markersEnabled=!markersEnabled; markers.forEach(m=>{ if(m.rect) m.rect.setVisible(markersEnabled); if(m.text) m.text.setVisible(markersEnabled); }); };
  document.getElementById('btnGodMode').onclick = ()=>toggleGodMode();
  document.getElementById('btnSpeed1').onclick = ()=>setSpeed(1); document.getElementById('btnSpeed2').onclick = ()=>setSpeed(2);
  document.getElementById('btnSpeed4').onclick = ()=>setSpeed(4); document.getElementById('btnSpeed8').onclick = ()=>setSpeed(8);
}

function setupTouchControls() {
  const btnLeft=document.getElementById('btnLeft'), btnRight=document.getElementById('btnRight'), btnJump=document.getElementById('btnJump');
  const bind=(btn,key)=>{ btn.ontouchstart=btn.onmousedown=(e)=>{ if(e)e.preventDefault(); if(!isGameOver&&!isPaused&&!showMenu) window[key]=true; }; btn.ontouchend=btn.onmouseup=btn.onmouseleave=(e)=>{ if(e)e.preventDefault(); window[key]=false; }; };
  bind(btnLeft,'touchLeft'); bind(btnRight,'touchRight');
  btnJump.onclick=btnJump.ontouchstart=(e)=>{ if(e)e.preventDefault(); if(!isGameOver&&!isPaused&&!showMenu&&gameStarted&&(player.body.blocked.down||standingOnBox)&&!jumpCooldown){ player.setVelocityY(getJumpPower()); jumpCooldown=true; standingOnBox=false; currentScene.time.delayedCall(280,()=>{ jumpCooldown=false; }); } };
}

function update() {
  if(!gameStarted||showMenu||isGameOver||isPaused||isExploding) return;
  let leftActive=(this.cursors.left.isDown||touchLeft), rightActive=(this.cursors.right.isDown||touchRight);
  
  let targetVelX = 0;
  if(leftActive) targetVelX = -getPlayerSpeed();
  if(rightActive) targetVelX = getPlayerSpeed();
  player.setVelocityX(targetVelX);
  
  if(leftActive) lastDirection='left';
  if(rightActive) lastDirection='right';
  player.setFlipX(lastDirection==='left');
  
  if(this.cursors.up.isDown&&!jumpCooldown&&(player.body.blocked.down||standingOnBox)){ 
    player.setVelocityY(getJumpPower()); 
    jumpCooldown=true; 
    standingOnBox=false; 
    this.time.delayedCall(280,()=>{ jumpCooldown=false; }); 
  }
  if(!player.body.blocked.down&&player.body.velocity.y>0) standingOnBox=false;
  
  enforceBoundary();
  
  for (let box of pushedBoxes) {
    if (box && box.active) fixBoxYPosition(box);
  }
  
  if(playerDebugRect) playerDebugRect.setPosition(player.x + COLLIDER_OFFSET_X, player.y + COLLIDER_OFFSET_Y);
  syncBoxDebugRects();
  
  if((leftActive||rightActive)&&(player.body.blocked.down||standingOnBox)){ 
    if(!player.anims.isPlaying) player.play('run'); 
  } else { 
    if(player.anims.isPlaying) player.stop(); 
    if(!player.anims.isPlaying) player.setTexture('run1'); 
    player.setFlipX(lastDirection==='left'); 
  }
}
</script>
