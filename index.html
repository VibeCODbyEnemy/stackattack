        .speed-panel .active{background:#00aa44}

        .height-controls button,.capture-panel button,.push-speed-panel button,.jump-panel button{background:#4488ff;border:none;border-radius:30px;padding:4px 10px;font-size:14px;font-weight:bold}
        .height-indicator{font-size:10px;background:#000000aa;border-radius:20px;padding:2px 6px;margin-left:3px}

        .touch-panel{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:space-between;padding:0 20px;pointer-events:none;z-index:100}
        .move-group,.action-group{display:flex;gap:20px;background:rgba(0,0,0,0.4);padding:8px 20px;border-radius:100px;backdrop-filter:blur(8px);pointer-events:auto}
        .touch-panel button{background:rgba(30,40,60,0.95);border:2px solid rgba(255,255,255,0.5);border-radius:60px;color:white;font-size:28px;width:70px;height:70px;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
        .touch-panel button:active{transform:scale(0.95);background:#4a6a8a}
        @media (max-width:650px){.touch-panel button{width:55px;height:55px;font-size:24px}.ui button,.score,.speed-panel,.height-controls,.capture-panel,.push-speed-panel,.jump-panel,.color-mode-panel{font-size:9px;padding:4px 8px}.speed-panel span,.capture-panel span,.push-speed-panel span,.jump-panel span,.color-mode-panel span{font-size:8px}}
        .title-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a2a32;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:1000;text-align:center;padding:20px}
        .title-screen h1{color:white;font-size:8vw;text-shadow:0 0 10px #ffaa44;margin-bottom:30px}
        .title-screen button{background:#ffaa44;border:none;font-size:5vw;padding:12px 32px;border-radius:40px;cursor:pointer;font-weight:bold;font-family:monospace;margin:10px}
        .toast-msg{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#00aa44dd;color:white;padding:8px 20px;border-radius:40px;font-size:14px;z-index:2000;backdrop-filter:blur(8px);pointer-events:none;animation:fadeOut 2s forwards;white-space:nowrap}
        @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
        .separator{width:1px;height:24px;background:rgba(255,255,255,0.3);margin:0 4px}
        .horiz-panel{background:#3a2a5a80 !important}

<script>
// НАСТРОЙКИ (скорость 50, падение 0.7, прыжок -105, гравитация 130)
const DEFAULTS = {
    playerGroundY:360, boxGroundY:370, standOffset:12, playerSpeed:50, boxFallSpeed:0.7,
    horizTolerance:5, vertPushTolerance:10, pushSpeedMult:0.2, jumpPower:-105, gravity:130
};
const W=800, H=400, BOX=38, MAX_STACK=8, WIN=16;
const BASE_SPAWN_DELAY = 2200;
const MARKERS = [97,135,173,211,249,287,325,363,401,439,477,515,553,591,629,667];
const PLAYER_W=32, PLAYER_H=52, PHW=PLAYER_W/2, PHH=PLAYER_H/2;
const FALL_BASE=60, DMG_CD=0.6, JUMP_CD=350;
const COLORS_RANDOM = ['#ccaa66','#aa66cc','#66ccaa','#cc6666','#66aaff'];

let canvas, ctx, gameRunning=false, gamePaused=false, score=0, godMode=false, lives=3, dmgCd=0, shake=0;
let playerGroundY=DEFAULTS.playerGroundY, boxGroundY=DEFAULTS.boxGroundY, standOffset=DEFAULTS.standOffset;
let playerSpeed=DEFAULTS.playerSpeed, fallMult=DEFAULTS.boxFallSpeed, spawnMult=1;
let horizTol=DEFAULTS.horizTolerance, vertTol=DEFAULTS.vertPushTolerance, pushMult=DEFAULTS.pushSpeedMult, jumpPower=DEFAULTS.jumpPower;
let gravity = DEFAULTS.gravity;
let playerX=200, playerY, playerVy=0, grounded=true, jumpCd=false, lastDir='right';
let left=false, right=false, forcePush=false, forceDir=0;
let boxes=[], stacks=new Map(), markers=[], markersVis=false, Lbound=0, Rbound=800;
let spawnInt=null, exploding=false, pushCd=false, animId=null, particles=[], lastTime=0;
let images={}, bgMusic=null;
let blockedKeys = new Set();
let colorMode = 0;
let fps = 60, frameCount = 0, lastFpsUpdate = 0;
let lastSpawnMarkerIndex = -1;

// Новая переменная для толкаемого ящика (скольжение с синхронизацией скорости)
let slidingBox = null;           // { box, targetX, startX, duration, elapsed, dir }
let slidingAnimFrame = null;

function showToast(msg, ok=true){ let d=document.createElement('div'); d.className='toast-msg'; d.textContent=msg; d.style.background=ok?'#00aa44dd':'#ff6644dd'; document.body.appendChild(d); setTimeout(()=>d.remove(),2000);}
function getBoxBaseY(){ return boxGroundY-BOX/2; }
function stackKey(x){ return Math.round(x/BOX)*BOX; }
function getStack(box){ let k=stackKey(box.x); if(!stacks.has(k)) stacks.set(k,[]); return stacks.get(k); }
function addToStack(box){
    let s = getStack(box);
    if(!s.includes(box)) s.push(box);
    s.sort((a,b)=>b.y-a.y);
    for(let i=0;i<s.length;i++) s[i].y = getBoxBaseY()-i*BOX;
}
function removeFromStack(box){
    let s = getStack(box);
    let idx = s.indexOf(box);
    if(idx!==-1) s.splice(idx,1);
    if(s.length===0) stacks.delete(stackKey(box.x));
    else for(let i=0;i<s.length;i++) s[i].y = getBoxBaseY()-i*BOX;
}
function getTargetY(box){
    let key = stackKey(box.x);
    if(!stacks.has(key)) return getBoxBaseY();
    return getBoxBaseY() - stacks.get(key).length * BOX;
}
function isTopBox(box){
    if(!box.active) return false;
    let key=stackKey(box.x);
    if(!stacks.has(key)) return true;
    let stack=stacks.get(key);
    return stack.length===0 || Math.abs(box.y - Math.min(...stack.map(b=>b.y))) < 0.5;
}
function getBoxColor(box){
    if(colorMode===0) return box.color || '#ccaa66';
    let key=stackKey(box.x);
    if(!stacks.has(key)) return '#ffaa44';
    let stack=stacks.get(key), idx=stack.indexOf(box);
    if(idx===-1) return '#ffaa44';
    if(stack.length===1 || idx===0) return '#ff0000';
    if(idx===stack.length-1) return '#000000';
    return '#2288ff';
}
function isMovable(box){ let l=box.x-BOX/2, r=box.x+BOX/2; for(let o of boxes) if(o!==box && Math.abs(o.y-box.y)<BOX/2 && r>o.x-BOX/2-2 && l<o.x+BOX/2+2) return false; return true; }
function addExplosion(x,y){ for(let i=0;i<20;i++){ let a=Math.random()*Math.PI*2, s=2+Math.random()*5; particles.push({x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2, life:0.8+Math.random()*0.5, size:3+Math.random()*4, color:`hsl(${30+Math.random()*30},80%,60%)`}); } }
function destroyBox(box,addScore=true){ if(!box.active) return; addExplosion(box.x,box.y); let idx=boxes.indexOf(box); if(idx!==-1) boxes.splice(idx,1); removeFromStack(box); box.active=false; if(addScore){ score+=20; document.getElementById('scoreBoard').innerHTML=`ОЧКИ: ${score}`; } }
function damageShake(){ shake=8; setTimeout(()=>{shake=0;},300); }
function initMarkers(){ markers=MARKERS.map(x=>({x})); Lbound=markers[0].x; Rbound=markers[markers.length-1].x+BOX; }
function getRandomX(){ return markers.length?markers[Math.floor(Math.random()*markers.length)].x:400; }

function getSpawnPosition() {
    let available = [];
    for (let i = 0; i < markers.length; i++) {
        let key = stackKey(markers[i].x + BOX/2);
        let stackHeight = stacks.has(key) ? stacks.get(key).length : 0;
        if (stackHeight < MAX_STACK) available.push(i);
    }
    if (available.length === 0) { gameOver("Все стопки переполнены!"); return null; }
    let chosenIndex;
    if (available.length > 1 && available.includes(lastSpawnMarkerIndex)) {
        let other = available.filter(i => i !== lastSpawnMarkerIndex);
        chosenIndex = other[Math.floor(Math.random() * other.length)];
    } else {
        chosenIndex = available[Math.floor(Math.random() * available.length)];
    }
    lastSpawnMarkerIndex = chosenIndex;
    return markers[chosenIndex].x + BOX/2;
}

function updateFalling(delta){
    for(let b of boxes){
        if(!b.active || !b.isFalling || b.isSliding) continue;
        let key = stackKey(b.x);
        if(blockedKeys.has(key)) continue;
        let targetY = getTargetY(b);
        if(Math.abs(b.y - targetY) < 0.8){
            b.isFalling = false;
            b.y = targetY;
            addToStack(b);
            checkLines();
            continue;
        }
        let step = FALL_BASE * fallMult * delta;
        let dir = (targetY > b.y) ? 1 : -1;
        let newY = b.y + dir * step;
        if((dir===1 && newY>=targetY) || (dir===-1 && newY<=targetY)){
            b.y = targetY;
            b.isFalling = false;
            addToStack(b);
            checkLines();
        } else {
            b.y = newY;
        }
    }
}

// НОВАЯ ФУНКЦИЯ: толкание ящика с привязкой к скорости персонажа (playerSpeed * spawnMult)
function startSlidingBox(box, targetX, oldKey, newKey) {
    if (slidingBox) return false; // уже толкаем другой ящик
    // Рассчитываем время перемещения, исходя из скорости персонажа (пикселей в секунду)
    let currentPlayerSpeed = playerSpeed * spawnMult;
    if (currentPlayerSpeed <= 0.1) currentPlayerSpeed = 50; // fallback
    let distance = Math.abs(targetX - box.x);
    let durationSec = distance / currentPlayerSpeed;   // время в секундах
    let durationMs = Math.max(50, durationSec * 1000);  // минимум 50 мс для плавности, но обычно ~300-500 мс
    
    slidingBox = {
        box: box,
        startX: box.x,
        targetX: targetX,
        duration: durationMs,
        elapsed: 0,
        oldKey: oldKey,
        newKey: newKey,
        active: true
    };
    blockedKeys.add(oldKey);
    blockedKeys.add(newKey);
    box.isFalling = false;
    box.isSliding = true;
    
    // Запускаем анимацию на requestAnimationFrame
    if (slidingAnimFrame) cancelAnimationFrame(slidingAnimFrame);
    function updateSlide(timestamp) {
        if (!slidingBox || !slidingBox.active || !gameRunning) {
            slidingBox = null;
            return;
        }
        if (!slidingBox.startTime) {
            slidingBox.startTime = timestamp;
            slidingAnimFrame = requestAnimationFrame(updateSlide);
            return;
        }
        let now = timestamp;
        let elapsed = now - slidingBox.startTime;
        let t = Math.min(1, elapsed / slidingBox.duration);
        // easing linear для синхронности
        let newX = slidingBox.startX + (slidingBox.targetX - slidingBox.startX) * t;
        slidingBox.box.x = newX;
        
        if (t >= 1.0) {
            // завершили перемещение
            slidingBox.box.x = slidingBox.targetX;
            slidingBox.box.isSliding = false;
            slidingBox.box.isFalling = true;
            blockedKeys.delete(slidingBox.oldKey);
            blockedKeys.delete(slidingBox.newKey);
            slidingBox = null;
            // после завершения заново обрабатываем падение ящика и стеки
            if (slidingBox?.box?.active) {
                // обновляем стеки: ящик должен упасть на новом месте
                removeFromStack(slidingBox.box); // но его уже нет в стеке? при старте слайда мы удалили из стека
                addToStack(slidingBox.box);
                checkLines();
            }
            cancelAnimationFrame(slidingAnimFrame);
            slidingAnimFrame = null;
            return;
        }
        slidingAnimFrame = requestAnimationFrame(updateSlide);
    }
    slidingBox.startTime = null;
    slidingAnimFrame = requestAnimationFrame(updateSlide);
    return true;
}

function tryPush(box,dir,force=false){
    if(pushCd||exploding) return false;
    if(!isTopBox(box)) return false;
    if(!force && Math.abs((playerY+PHH)-box.y)>vertTol) return false;
    if(!isMovable(box)) return false;
    let newX=box.x+dir*BOX;
    if(newX<Lbound+BOX/2 || newX>Rbound-BOX/2) return false;
    for(let o of boxes) if(o!==box && Math.abs(o.x-newX)<BOX-1 && Math.abs(o.y-box.y)<BOX/2) return false;
    pushCd=true;
    let oldKey=stackKey(box.x), newKey=stackKey(newX);
    removeFromStack(box);
    box.isFalling=false; box.isSliding=true;
    // Вместо старой slideBox используем новую синхронизированную анимацию
    let success = startSlidingBox(box, newX, oldKey, newKey);
    if (!success) {
        // если не удалось (уже есть толкаемый) возвращаем ящик обратно
        addToStack(box);
        box.isSliding = false;
        box.isFalling = true;
        pushCd=false;
        return false;
    }
    // Сброс pushCd произойдёт после завершения анимации. Для блокировки повторных толчков пока ящик движется
    // Однако сам pushCd нужно сбросить не сразу, а по окончании движения, чтобы не спамить.
    // Используем флаг slidingBox, а pushCd сбросим в отдельном таймере по длительности
    setTimeout(() => {
        pushCd = false;
    }, (BOX / (playerSpeed * spawnMult + 0.1)) * 1000 + 50);
    return true;
}

function tryForcePush(){
    if(!forcePush||pushCd||exploding) return false;
    let dir=forceDir;
    if(dir===0) return false;
    let frontX=playerX+(dir===1?PHW:-PHW), cy=playerY+PHH;
    let target=null, best=Infinity;
    for(let b of boxes){
        let left=b.x-BOX/2, right=b.x+BOX/2;
        if((dir===1 && frontX<=right+horizTol && frontX>=left-horizTol/2) || (dir===-1 && frontX>=left-horizTol && frontX<=right+horizTol/2)){
            if(Math.abs(cy-b.y)<=vertTol && Math.abs(b.x-playerX)<best){ best=Math.abs(b.x-playerX); target=b; }
        }
    }
    return target ? tryPush(target,dir,true) : false;
}

function checkLines(){ 
    if(exploding) return false; 
    let all=[]; for(let s of stacks.values()) all.push(...s); 
    if(all.length<WIN) return false; 
    let rows=new Map(); 
    for(let b of all){ let found=false; for(let [y,arr] of rows) if(Math.abs(b.y-y)<=5){ arr.push(b); found=true; break; } if(!found) rows.set(b.y,[b]); } 
    let toExplode=[]; 
    for(let [y,arr] of rows){ 
        if(arr.length>=WIN){ 
            arr.sort((a,b)=>a.x-b.x); 
            let chain=[arr[0]]; 
            for(let i=1;i<arr.length;i++) if(arr[i].x-arr[i-1].x<=BOX+2) chain.push(arr[i]); else { if(chain.length>=WIN) toExplode.push(chain.slice()); chain=[arr[i]]; } 
            if(chain.length>=WIN) toExplode.push(chain); 
        } 
    } 
    if(toExplode.length===0) return false; 
    exploding=true; 
    let cnt=0; 
    for(let row of toExplode){ cnt+=row.length; for(let b of row) if(b.active) destroyBox(b,false); } 
    score+=cnt*50; document.getElementById('scoreBoard').innerHTML=`ОЧКИ: ${score}`; 
    canvas.style.transform=`translate(${Math.sin(Date.now()*0.05)*3}px,${Math.cos(Date.now()*0.07)*2}px)`; 
    setTimeout(()=>{ canvas.style.transform=''; exploding=false; },500); 
    return true; 
}

function handleHeadBump() {
    if(!gameRunning) return false;
    for(let b of boxes){
        if(!b.active) continue;
        let left=b.x-BOX/2, right=b.x+BOX/2;
        if(!(playerX+PHW>left && playerX-PHW<right)) continue;
        let headTop=playerY-PHH, headBottom=playerY-PHH+12, boxTop=b.y-BOX/2, boxBottom=b.y+BOX/2;
        if(!(headBottom>boxTop && headTop<boxBottom)) continue;
        if(playerVy<-0.5){
            destroyBox(b,true);
            for(let i=0;i<10;i++) particles.push({x:playerX+(Math.random()-0.5)*20, y:playerY-PHH+5, vx:(Math.random()-0.5)*3, vy:Math.random()*2, life:0.5, size:2+Math.random()*3, color:'#ffaa66'});
            showToast(`💥 Отбил ящик головой! +20 очков`,true);
            return true;
        }
    }
    return false;
}

function checkDamage(delta){ 
    if(godMode) return; 
    if(dmgCd>0) dmgCd-=delta; 
    for(let b of boxes){ 
        if(!b.active) continue;
        if(b.prevY===undefined || b.y<=b.prevY) continue;
        if(playerVy<-0.8) continue;
        let left=b.x-BOX/2, right=b.x+BOX/2;
        if(!(playerX+PHW>left && playerX-PHW<right)) continue;
        let headTop=playerY-PHH, headBottom=playerY-PHH+PHH*0.6, boxBottom=b.y+BOX/2, boxTop=b.y-BOX/2;
        if(!(boxBottom>headTop && boxTop<headBottom)) continue;
        if(dmgCd<=0 && !godMode){ 
            lives--; dmgCd=DMG_CD; damageShake(); destroyBox(b,false);
            showToast(`💀 Ящик упал на голову! -1 жизнь, осталось: ${lives}`,false); 
            if(lives<=0) gameOver("У вас закончились жизни!"); 
            break; 
        } 
    } 
}

function getStandingBox(){ let feet=playerY+PHH; for(let b of boxes){ let top=b.y-BOX/2, left=b.x-BOX/2, right=b.x+BOX/2; if(Math.max(0,Math.min(playerX+PHW,right)-Math.max(playerX-PHW,left))>=5){ let standY=top-standOffset; if(feet>=standY-5 && feet<=standY+8 && playerVy>=0) return b; } } return null; }

function spawnBox(){ 
    if(!gameRunning||gamePaused||exploding) return; 
    let x = getSpawnPosition();
    if (x === null) return;
    let key = stackKey(x); 
    if(blockedKeys.has(key)){ setTimeout(()=>spawnBox(),100); return; }
    for(let b of boxes) if(b.isSliding && Math.abs(b.x-x)<BOX-2){ setTimeout(()=>spawnBox(),50); return; } 
    let h=stacks.has(key)?stacks.get(key).length:0; 
    if(h>=MAX_STACK){ gameOver(`Высота ${MAX_STACK}!`); return; } 
    let yTarget=getBoxBaseY()-h*BOX; 
    boxes.push({ x, y:20, active:true, color:COLORS_RANDOM[Math.floor(Math.random()*COLORS_RANDOM.length)], isFalling:true, isSliding:false, prevY:20 }); 
}

function updatePhysics(delta){
    let move=0;
    if(left && !right) move=-1;
    else if(right && !left) move=1;
    if(move){
        playerX += playerSpeed * spawnMult * move * delta;
        lastDir = move===1 ? 'right' : 'left';
    }
    if(forcePush){ if(left) forceDir=-1; else if(right) forceDir=1; else forceDir=0; tryForcePush(); } else forceDir=0;
    
    for(let b of boxes){
        let l=b.x-BOX/2, r=b.x+BOX/2, t=b.y-BOX/2, bt=b.y+BOX/2;
        if(playerY-PHH<bt && playerY+PHH>t){
            if(playerX+PHW>l && playerX-PHW<l) playerX=l-PHW;
            else if(playerX-PHW<r && playerX+PHW>r) playerX=r+PHW;
        }
    }
    
    if(jumpPressed && grounded && !jumpCd){
        playerVy = jumpPower * Math.sqrt(spawnMult);
        grounded=false; jumpCd=true;
        setTimeout(()=>jumpCd=false,JUMP_CD);
    }
    jumpPressed=false;
    
    if(!grounded){
        playerVy += gravity * spawnMult * delta;
        playerY += playerVy * delta;
    }
    let standing=getStandingBox();
    if(standing){ let top=standing.y-BOX/2; playerY=top-standOffset-PHH; playerVy=0; grounded=true; }
    else if(playerY+PHH>=playerGroundY){ playerY=playerGroundY-PHH; playerVy=0; grounded=true; }
    else grounded=false;
    
    playerX=Math.min(Rbound-PHW,Math.max(Lbound+PHW,playerX));
    handleHeadBump();
    
    if(!pushCd && !exploding && !forcePush && move!==0){
        let dir=move===1?1:-1, frontX=playerX+(dir===1?PHW:-PHW), cy=playerY+PHH;
        let best=null, bestDist=Infinity;
        for(let b of boxes){
            if(b.isSliding) continue;
            let left=b.x-BOX/2, right=b.x+BOX/2;
            let horizMatch=(dir===1 && frontX<=right+horizTol && frontX>=left-horizTol/2) || (dir===-1 && frontX>=left-horizTol && frontX<=right+horizTol/2);
            if(horizMatch && isTopBox(b) && Math.abs(cy-b.y)<=vertTol && Math.abs(b.x-playerX)<bestDist){ bestDist=Math.abs(b.x-playerX); best=b; }
        }
        if(best && !best.isSliding) tryPush(best,dir,false);
    }
    
    updateFalling(delta);
    checkDamage(delta);
}

function draw(){ 
    ctx.clearRect(0,0,W,H); ctx.fillStyle='#2a4a5a'; ctx.fillRect(0,0,W,H); 
    if(images.bg && images.bg.complete) ctx.drawImage(images.bg,0,0,W,H);
    if(markersVis) for(let m of markers){ ctx.fillStyle='rgba(255,0,0,0.25)'; ctx.fillRect(m.x,0,BOX,H); ctx.strokeStyle='rgba(255,0,0,0.8)'; ctx.strokeRect(m.x,0,BOX,H); }
    
    for(let b of boxes) if(b.active){ 
        if(images.box && images.box.complete){
            ctx.drawImage(images.box, b.x-BOX/2, b.y-BOX/2, BOX, BOX);
        } else {
            ctx.fillStyle = getBoxColor(b);
            ctx.fillRect(b.x-BOX/2, b.y-BOX/2, BOX, BOX);
            ctx.strokeStyle = '#886633';
            ctx.strokeRect(b.x-BOX/2, b.y-BOX/2, BOX, BOX);
        }
    }
    
    let frame = (grounded && (left||right)) ? `run${Math.floor(Date.now()/100)%4+1}` : 'run1';
    let img = images[frame];
    if(img && img.complete){
        let w = img.width * 0.24, h = img.height * 0.24;
        ctx.save();
        if(lastDir === 'left'){
            ctx.translate(playerX, playerY);
            ctx.scale(-1, 1);
            ctx.drawImage(img, -w/2, -h/2, w, h);
        } else {
            ctx.drawImage(img, playerX - w/2, playerY - h/2, w, h);
        }
        ctx.restore();
    } else {
        ctx.save();
        if(lastDir === 'left'){
            ctx.translate(playerX, playerY);
            ctx.scale(-1, 1);
            ctx.beginPath();
            ctx.ellipse(0, 0, PHW, PHH, 0, 0, Math.PI*2);
            ctx.fillStyle = '#ffaa66';
            ctx.fill();
        } else {
            ctx.beginPath();
            ctx.ellipse(playerX, playerY, PHW, PHH, 0, 0, Math.PI*2);
            ctx.fillStyle = '#ffaa66';
            ctx.fill();
        }
        ctx.restore();
    }
    
    for(let p of particles){ ctx.fillStyle=p.color; ctx.globalAlpha=Math.min(1,p.life*1.5); ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size); } 
    ctx.globalAlpha=1;
    let heart=images.heart; 
    for(let i=0;i<lives;i++) if(heart && heart.complete) ctx.drawImage(heart,10+i*32,8,28,28); 
    else { ctx.fillStyle='#ff3366'; ctx.beginPath(); let x=10+i*32+14, y=22, r=14; ctx.moveTo(x,y+r/2); ctx.bezierCurveTo(x,y-r/2,x-r,y-r/2,x-r,y); ctx.bezierCurveTo(x-r,y+r/2,x,y+r,x,y+r); ctx.bezierCurveTo(x,y+r,x+r,y+r/2,x+r,y); ctx.bezierCurveTo(x+r,y-r/2,x,y-r/2,x,y+r/2); ctx.fill(); }
    let shakeX=0,shakeY=0; if(shake>0){ shakeX=(Math.random()-0.5)*shake; shakeY=(Math.random()-0.5)*shake; } canvas.style.transform=`translate(${shakeX}px,${shakeY}px)`;
    
    ctx.font = "12px monospace";
    ctx.fillStyle = "#ffffffcc";
    ctx.fillText(`FPS: ${fps}`, W - 55, 20);
}

let jumpPressed=false;
function gameLoop(now){ if(!gameRunning || gamePaused){ animId=requestAnimationFrame(gameLoop); return; } if(!lastTime) lastTime=now; let delta=Math.min(0.1,(now-lastTime)/1000); if(delta<=0){ lastTime=now; animId=requestAnimationFrame(gameLoop); return; } lastTime=now; 
    for(let b of boxes) if(b.active) b.prevY=b.y;
    updatePhysics(delta); 
    for(let i=particles.length-1;i>=0;i--){ let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=0.02; if(p.life<=0 || p.y>H+50) particles.splice(i,1); } 
    draw();
    frameCount++;
    const nowPerf = performance.now();
    if (nowPerf - lastFpsUpdate >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastFpsUpdate = nowPerf;
    }
    animId=requestAnimationFrame(gameLoop); 
}

function gameOver(reason){ if(!gameRunning) return; gameRunning=false; if(spawnInt) clearInterval(spawnInt); if(animId) cancelAnimationFrame(animId); if(bgMusic) bgMusic.pause(); alert(`Игра окончена!\n${reason}\nОчки: ${score}`); document.getElementById('titleScreen').style.display='flex'; document.getElementById('ui').style.display='none'; document.getElementById('touchPanel').style.display='none'; }
function fullRestart(){
    if(spawnInt) clearInterval(spawnInt); if(animId) cancelAnimationFrame(animId);
    if(slidingAnimFrame) cancelAnimationFrame(slidingAnimFrame);
    slidingBox = null;
    gameRunning=false; gamePaused=false; score=0; lives=3; dmgCd=0; shake=0; left=right=forcePush=false; boxes=[]; stacks.clear(); exploding=false; pushCd=false; particles=[]; blockedKeys.clear();
    playerGroundY=DEFAULTS.playerGroundY; boxGroundY=DEFAULTS.boxGroundY; standOffset=DEFAULTS.standOffset; playerSpeed=DEFAULTS.playerSpeed; fallMult=DEFAULTS.boxFallSpeed; horizTol=DEFAULTS.horizTolerance; vertTol=DEFAULTS.vertPushTolerance; pushMult=DEFAULTS.pushSpeedMult; jumpPower=DEFAULTS.jumpPower; gravity = DEFAULTS.gravity; spawnMult=1; lastSpawnMarkerIndex = -1;
    playerX=markers.length?markers[0].x+BOX/2:200; playerY=playerGroundY-PHH; playerVy=0; grounded=true; jumpCd=false;
    updateParamDisplays();
    document.querySelectorAll('.speed-panel .active').forEach(b=>b.classList.remove('active')); document.getElementById('btnSpeed1').classList.add('active');
    gameRunning=true;
    let delay = BASE_SPAWN_DELAY / fallMult;
    spawnInt = setInterval(()=>spawnBox(), delay);
    lastTime=0; lastFpsUpdate = performance.now(); frameCount = 0;
    animId=requestAnimationFrame(gameLoop);
    if(bgMusic){ bgMusic.currentTime=0; if(!gamePaused) bgMusic.play().catch(e=>{}); }
    showToast(`🔄 Ящики с текстурой box.png, спавн каждые ${Math.round(delay)} мс`);
}
function updateParamDisplays(){
    document.getElementById('playerGroundValue').innerText=playerGroundY;
    document.getElementById('boxGroundValue').innerText=boxGroundY;
    document.getElementById('standOffsetValue').innerText=standOffset;
    document.getElementById('playerSpeedValue').innerText=playerSpeed.toFixed(1);
    document.getElementById('boxFallSpeedValue').innerText=fallMult.toFixed(2);
    document.getElementById('horizCaptureValue').innerText=horizTol;
    document.getElementById('vertPushValue').innerText=vertTol;
    document.getElementById('pushSpeedValue').innerText=pushMult.toFixed(1);
    document.getElementById('jumpPowerValue').innerText=jumpPower;
    document.getElementById('gravityValue').innerText=gravity.toFixed(1);
    document.getElementById('scoreBoard').innerHTML=`ОЧКИ: ${score}`;
}
function initGame(){ fullRestart(); document.getElementById('titleScreen').style.display='none'; document.getElementById('ui').style.display='flex'; document.getElementById('touchPanel').style.display='flex'; document.getElementById('advancedPanels').style.display='none'; resizeCanvas(); showToast(`✅ Используется box.png`); }
function syncAllHeights(){ if(!gameRunning) return; let all=[...boxes]; stacks.clear(); for(let b of all){ let k=stackKey(b.x); if(!stacks.has(k)) stacks.set(k,[]); stacks.get(k).push(b); } for(let s of stacks.values()){ s.sort((a,b)=>b.y-a.y); for(let i=0;i<s.length;i++) s[i].y=getBoxBaseY()-i*BOX; } let feet=playerY+PHH; for(let b of boxes){ let top=b.y-BOX/2; if(Math.abs(feet-top)<15 && playerX+PHW>b.x-BOX/2 && playerX-PHW<b.x+BOX/2){ playerY=top-standOffset-PHH; playerVy=0; grounded=true; break; } } if(!grounded && playerY+PHH>playerGroundY){ playerY=playerGroundY-PHH; playerVy=0; grounded=true; } showToast(`✅ Синхронизировано`); }
function saveFullConfig(){ let cfg=`// ПОЛНАЯ КОНФИГУРАЦИЯ\nconst SAVED_PLAYER_GROUND_Y=${playerGroundY};\nconst SAVED_BOX_GROUND_Y=${boxGroundY};\nconst SAVED_STAND_OFFSET=${standOffset};\nconst SAVED_PLAYER_SPEED=${playerSpeed};\nconst SAVED_BOX_FALL_SPEED=${fallMult};\nconst SAVED_HORIZONTAL_TOLERANCE=${horizTol};\nconst SAVED_VERTICAL_PUSH_TOLERANCE=${vertTol};\nconst SAVED_PUSH_SPEED_MULTIPLIER=${pushMult};\nconst SAVED_JUMP_POWER=${jumpPower};\nconst SAVED_GRAVITY=${gravity};\n`; navigator.clipboard.writeText(cfg).then(()=>showToast(`💾 Конфигурация скопирована`)); }
function saveToCode(){ let cfg=`// НАСТРОЙКИ ДВИЖЕНИЯ\nconst SAVED_HORIZONTAL_TOLERANCE=${horizTol};\nconst SAVED_VERTICAL_PUSH_TOLERANCE=${vertTol};\nconst SAVED_PUSH_SPEED_MULTIPLIER=${pushMult};\nconst SAVED_JUMP_POWER=${jumpPower};\nconst SAVED_GRAVITY=${gravity};\n`; navigator.clipboard.writeText(cfg).then(()=>showToast(`📋 Настройки скопированы`)); }
function setPlayerSpeed(v){ playerSpeed=Math.min(80,Math.max(1,v)); document.getElementById('playerSpeedValue').innerText=playerSpeed.toFixed(1); showToast(`🏃 Скорость: ${playerSpeed.toFixed(1)}`);}
function setFall(v){ fallMult=Math.min(3,Math.max(0.2,v)); document.getElementById('boxFallSpeedValue').innerText=fallMult.toFixed(2); showToast(`📦 Падение: ${(FALL_BASE*fallMult).toFixed(1)} px/с`); 
    if(spawnInt && gameRunning){ clearInterval(spawnInt); let delay = BASE_SPAWN_DELAY / fallMult / spawnMult; spawnInt=setInterval(()=>spawnBox(),delay); showToast(`⏱️ Интервал спавна изменён на ${Math.round(delay)} мс`); } }
function setJump(v){ jumpPower=Math.min(-15,Math.max(-200,v)); document.getElementById('jumpPowerValue').innerText=jumpPower; showToast(`🦘 Сила прыжка: ${jumpPower}`);}
function setGravity(v){ gravity = Math.min(350, Math.max(20, v)); document.getElementById('gravityValue').innerText=gravity.toFixed(1); showToast(`🌎 Гравитация: ${gravity.toFixed(1)}`); }
function setHoriz(v){ horizTol=Math.min(35,Math.max(2,v)); document.getElementById('horizCaptureValue').innerText=horizTol; showToast(`↔️ Горизонт. зона: ${horizTol}`);}
function setVert(v){ vertTol=Math.min(45,Math.max(5,v)); document.getElementById('vertPushValue').innerText=vertTol; showToast(`🔼 Вертик. допуск: ${vertTol}`);}
function setPush(v){ pushMult=Math.min(5,Math.max(0.2,v)); document.getElementById('pushSpeedValue').innerText=pushMult.toFixed(1); showToast(`📦 Скорость толкания: x${pushMult.toFixed(1)}`);}
function toggleUI(){
    let p=document.getElementById('advancedPanels');
    if(p.style.display==='none'){ p.style.display='flex'; showToast("🔘 Расширенный интерфейс включён"); updateParamDisplays(); }
    else { p.style.display='none'; showToast("🔘 Расширенный интерфейс скрыт"); updateParamDisplays(); }
}
function toggleColorMode(){ colorMode=1-colorMode; document.getElementById('btnColorMode').innerHTML=colorMode===0?'🌈 СЛУЧАЙНЫЕ':'🔴🔵⚫ ПО ВЫСОТЕ'; showToast(colorMode===0?'🎨 Режим цветов: случайные':'🎨 Режим цветов: по высоте стопки (только если нет текстуры)'); }
function resizeCanvas(){ let scale=Math.min(window.innerWidth/W,window.innerHeight/H); canvas.style.width=`${W*scale}px`; canvas.style.height=`${H*scale}px`; }
window.addEventListener('resize',resizeCanvas);
function handleVisibility(){ if(!gameRunning) return; if(document.hidden){ gamePaused=true; if(bgMusic) bgMusic.pause(); } else { gamePaused=false; if(bgMusic) bgMusic.play().catch(e=>{}); lastTime=0; } }
document.addEventListener('visibilitychange',handleVisibility);
window.addEventListener('blur',()=>{ if(gameRunning){ gamePaused=true; if(bgMusic) bgMusic.pause(); }});
window.addEventListener('focus',()=>{ if(gameRunning){ gamePaused=false; if(bgMusic) bgMusic.play().catch(e=>{}); lastTime=0; }});
function loadAssets(cb){
    let loaded=0, total=7; 
    let list={bg:'bg.png', run1:'run1.png', run2:'run2.png', run3:'run3.png', run4:'run4.png', heart:'heart.png', box:'box.png'};
    for(let [k,src] of Object.entries(list)){ let img=new Image(); img.onload=img.onerror=()=>{ loaded++; if(loaded===total) cb(); }; img.src=src; images[k]=img; }
    let titleImg=document.getElementById('titleImage'); if(titleImg){ titleImg.onerror=()=>titleImg.style.display='none'; titleImg.src='title.png'; }
    bgMusic=new Audio('music.mp3'); bgMusic.loop=true; bgMusic.volume=0.1;
}
function setupControls(){
    window.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft') left=true; if(e.key==='ArrowRight') right=true; if(e.key==='ArrowUp') jumpPressed=true; if(e.key==='q') playerGroundY=Math.min(395,Math.max(280,playerGroundY-5)); if(e.key==='w') playerGroundY=Math.min(395,Math.max(280,playerGroundY+5)); if(e.key==='a') boxGroundY=Math.min(395,Math.max(280,boxGroundY-5)); if(e.key==='s') boxGroundY=Math.min(395,Math.max(280,boxGroundY+5)); if(e.key==='z'||e.key==='Z'){ forcePush=true; e.preventDefault(); } });
    window.addEventListener('keyup',e=>{ if(e.key==='ArrowLeft') left=false; if(e.key==='ArrowRight') right=false; if(e.key==='z'||e.key==='Z'){ forcePush=false; forceDir=0; } });
    document.getElementById('btnLeft').addEventListener('touchstart',e=>{e.preventDefault(); left=true;}); document.getElementById('btnLeft').addEventListener('touchend',e=>{e.preventDefault(); left=false;}); document.getElementById('btnLeft').addEventListener('mousedown',()=>left=true); document.getElementById('btnLeft').addEventListener('mouseup',()=>left=false);
    document.getElementById('btnRight').addEventListener('touchstart',e=>{e.preventDefault(); right=true;}); document.getElementById('btnRight').addEventListener('touchend',e=>{e.preventDefault(); right=false;}); document.getElementById('btnRight').addEventListener('mousedown',()=>right=true); document.getElementById('btnRight').addEventListener('mouseup',()=>right=false);
    document.getElementById('btnJump').addEventListener('click',()=>jumpPressed=true); document.getElementById('btnJump').addEventListener('touchstart',e=>{e.preventDefault(); jumpPressed=true;});
    document.getElementById('btnPause').onclick=()=>{ gamePaused=!gamePaused; if(gamePaused){ if(bgMusic) bgMusic.pause(); showToast("⏸ Пауза"); } else { if(bgMusic) bgMusic.play().catch(e=>{}); showToast("▶ Продолжение"); lastTime=0; } };
    document.getElementById('btnRestartGame').onclick=()=>fullRestart();
    document.getElementById('btnToggleUI').onclick=toggleUI;
    document.getElementById('btnMenu').onclick=()=>{ gameRunning=false; if(spawnInt) clearInterval(spawnInt); if(animId) cancelAnimationFrame(animId); if(bgMusic) bgMusic.pause(); document.getElementById('titleScreen').style.display='flex'; document.getElementById('ui').style.display='none'; document.getElementById('touchPanel').style.display='none'; };
    document.getElementById('btnToggleMarkers').onclick=()=>markersVis=!markersVis;
    document.getElementById('btnGodMode').onclick=()=>{ godMode=!godMode; showToast(godMode?"🛡️ Божественный режим вкл":"🛡️ Божественный режим выкл"); };
    document.getElementById('btnColorMode').onclick=toggleColorMode;
    document.getElementById('btnPlayerGroundUp').onclick=()=>{ playerGroundY=Math.min(395,Math.max(280,playerGroundY-5)); document.getElementById('playerGroundValue').innerText=playerGroundY; };
    document.getElementById('btnPlayerGroundDown').onclick=()=>{ playerGroundY=Math.min(395,Math.max(280,playerGroundY+5)); document.getElementById('playerGroundValue').innerText=playerGroundY; };
    document.getElementById('btnBoxGroundUp').onclick=()=>{ boxGroundY=Math.min(395,Math.max(280,boxGroundY-5)); document.getElementById('boxGroundValue').innerText=boxGroundY; };
    document.getElementById('btnBoxGroundDown').onclick=()=>{ boxGroundY=Math.min(395,Math.max(280,boxGroundY+5)); document.getElementById('boxGroundValue').innerText=boxGroundY; };
    document.getElementById('btnStandOffsetUp').onclick=()=>{ standOffset=Math.min(30,standOffset+2); document.getElementById('standOffsetValue').innerText=standOffset; };
    document.getElementById('btnStandOffsetDown').onclick=()=>{ standOffset=Math.max(-30,standOffset-2); document.getElementById('standOffsetValue').innerText=standOffset; };
    document.getElementById('btnSyncHeights').onclick=syncAllHeights;
    document.getElementById('btnSaveToCode').onclick=saveToCode;
    document.getElementById('btnSaveFullConfig').onclick=saveFullConfig;
    document.getElementById('btnPlayerSpeedUp').onclick=()=>setPlayerSpeed(playerSpeed+2); document.getElementById('btnPlayerSpeedDown').onclick=()=>setPlayerSpeed(playerSpeed-2);
    document.getElementById('btnBoxFallSpeedUp').onclick=()=>setFall(fallMult+0.05); document.getElementById('btnBoxFallSpeedDown').onclick=()=>setFall(fallMult-0.05);
    document.getElementById('btnJumpPowerUp').onclick=()=>setJump(jumpPower+5); document.getElementById('btnJumpPowerDown').onclick=()=>setJump(jumpPower-5);
    document.getElementById('btnGravityUp').onclick=()=>setGravity(gravity+10); document.getElementById('btnGravityDown').onclick=()=>setGravity(gravity-10);
    document.getElementById('btnHorizCaptureUp').onclick=()=>setHoriz(horizTol+1); document.getElementById('btnHorizCaptureDown').onclick=()=>setHoriz(horizTol-1);
    document.getElementById('btnVertPushUp').onclick=()=>setVert(vertTol+1); document.getElementById('btnVertPushDown').onclick=()=>setVert(vertTol-1);
    document.getElementById('btnPushSpeedUp').onclick=()=>setPush(pushMult+0.1); document.getElementById('btnPushSpeedDown').onclick=()=>setPush(pushMult-0.1);
    for(let [spd,id] of [[1,'btnSpeed1'],[2,'btnSpeed2'],[4,'btnSpeed4'],[8,'btnSpeed8']]) document.getElementById(id).onclick=()=>{ spawnMult=spd; document.querySelectorAll('.speed-panel .active').forEach(b=>b.classList.remove('active')); document.getElementById(id).classList.add('active'); if(spawnInt){ clearInterval(spawnInt); let delay = BASE_SPAWN_DELAY / fallMult / spawnMult; spawnInt=setInterval(()=>spawnBox(),delay); } showToast(`⚡ Скорость спавна x${spawnMult}`); };
}
window.onload=()=>{ canvas=document.getElementById('gameCanvas'); ctx=canvas.getContext('2d'); initMarkers(); setupControls(); loadAssets(()=>{}); document.getElementById('startBtn').onclick=initGame; resizeCanvas(); };
</script>
